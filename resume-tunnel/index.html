<script>
  window.addEventListener("message", function (event) {
    if (!event.data || event.data.type !== "theme-change") return;
    var isLight = event.data.theme === "light";
    document.documentElement.setAttribute("data-embed-dark", isLight ? "false" : "true");
    if (isLight) {
      document.documentElement.style.backgroundColor = "#f6f9ff";
      document.body.style.backgroundColor = "#f6f9ff";
      document.body.style.color = "#10182b";
    } else {
      document.documentElement.style.backgroundColor = "#050505";
      document.body.style.backgroundColor = "#050505";
      document.body.style.color = "#e8ecff";
    }
  });
</script>
